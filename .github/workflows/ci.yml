name: CI

# Vérifie sur chaque push et chaque PR : intégrité des données, lint, format et build.
on:
  push:
    branches-ignore: [main] # main est couvert par le workflow de déploiement
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Intégrité des données
        run: npm run validate
      - name: Tests unitaires
        run: npm test
      - name: Lint (ESLint)
        run: npm run lint
      - name: Format (Prettier)
        run: npm run format:check
      - name: Build
        run: npm run build
